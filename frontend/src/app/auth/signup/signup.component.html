<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Left Side - Compact Welcome Content -->
            <div class="auth-welcome">
                <div class="auth-header">
                    <i class="fas fa-robot"></i>
                    <h1>Join AI Evaluator</h1>
                    <p>Create your account to experience advanced AI-powered academic assessment.</p>
                </div>
                <ul class="auth-features">
                    <li><i class="fas fa-rocket"></i> Fast Evaluation</li>
                    <li><i class="fas fa-chart-bar"></i> Performance Analytics</li>
                    <li><i class="fas fa-shield-alt"></i> Secure Platform</li>
                    <li><i class="fas fa-graduation-cap"></i> Role-based Access</li>
                </ul>
            </div>

            <!-- Right Side - Wider Form Area -->
            <div class="auth-form-container">
                <form class="auth-form" id="signupForm" [formGroup]="signUpData" (submit)="signup()" >
                    <!-- Role Selection - Full Width -->
                    <div class="form-group full-width">
                        <label for="signupUserType">I am a</label>
                        <select formControlName="role" id="signupUserType" name="userType" (change)="toggleSignupFields()">
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="admin">Administrator</option>
                        </select>
                        <i class="fas fa-user-tag input-icon"></i>
                    </div>

                    <!-- Name and Basic Info - Split Columns -->
                    <div class="form-main-column">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input formControlName="fullName" type="text" id="fullName" name="fullName" required placeholder="Enter full name">
                            <i class="fas fa-user input-icon"></i>
                        </div>

                        <!-- Dynamic Fields -->
                        <div id="dynamicFields" [style.display]="signUpData.get('role')?.value ? 'grid' : 'none'">
                            <div class="form-group" id="idGroup">
                                <label id="idLabel">ID Number</label>
                                <input formControlName="idNumber" type="text" id="idInput" name="idNumber" placeholder="Enter ID">
                                <i class="fas fa-id-card input-icon"></i>
                            </div>

                            <div class="form-group" id="departmentGroup" [style.display]="showDepartment ? 'block' : 'none'">
                                <label for="department">Department</label>
                                <select formControlName="department" id="department" name="department">
                                    <option value="">department</option>
                                    <option value="cse">Computer Science</option>
                                    <option value="aiml">AI & ML</option>
                                    <option value="ds">Data Science</option>
                                    <option value="it">IT</option>
                                    <option value="ece">Electronics</option>
                                </select>
                                <i class="fas fa-building input-icon"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-side-column">
                        <!-- Email -->
                        <div class="form-group">
                            <label for="signupEmail">Email Address</label>
                            <input formControlName="email" type="email" id="signupEmail" name="email" required placeholder="Enter email">
                            <i class="fas fa-envelope input-icon"></i>
                        </div>

                        <!-- Password Fields -->
                        <div class="password-fields">
                            <div class="form-group">
                                <label for="signupPassword">Password</label>
                                <input formControlName="password" type="password" id="signupPassword" name="password" required placeholder="password">
                                <i class="fas fa-lock input-icon"></i>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input formControlName="confirmPassword" type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm">
                                <i class="fas fa-lock input-icon"></i>
                            </div>
                        </div>

                    </div>

                    <!-- Terms and Options -->
                    <div class="form-options">
                        <label class="checkbox">
                            <input formControlName="agreeTandC" type="checkbox" name="terms">
                            <span class="checkmark"></span>
                            I agree to the <a href="#" class="terms-link">Terms & Conditions</a>
                        </label>
                    </div>

                    <div class="form-options">
                        <label class="checkbox">
                            <input formControlName="sendProdUpdate" type="checkbox" name="newsletter">
                            <span class="checkmark"></span>
                            Send me product updates
                        </label>
                    </div>


                    <!-- Submit Button -->
                    <button type="submit" [class]="'btn btn-primary btn-auth'" [style]="{ cursor: signUpData.invalid ? 'not-allowed' : 'pointer' }" [disabled]="isLoading">
                        @if (isLoading) {
                            <span><i class="fas fa-spinner fa-spin"></i> Creating account...</span>
                        } @else {
                            <span class="btn-text">Create Account</span>
                        }

                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a routerLink="../login">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>


</div>
